<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>movy — Redesign · todas as telas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #2a2825;
        font-family:
          "Manrope",
          -apple-system,
          sans-serif;
        min-height: 100vh;
      }
      h1 {
        color: #fff;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin: 0 0 8px;
      }
      .sub {
        color: rgba(255, 255, 255, 0.55);
        font-size: 14px;
        margin-bottom: 28px;
      }
      header {
        padding: 40px 40px 0;
        max-width: 1400px;
        margin: 0 auto;
      }
      main {
        padding: 12px 40px 60px;
        max-width: 1400px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, 390px);
        gap: 40px 28px;
        justify-content: center;
      }
      .cell {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .cell .label {
        color: rgba(255, 255, 255, 0.75);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .frame {
        width: 390px;
        height: 844px;
        border-radius: 40px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>movy — Redesign</h1>
      <div class="sub">9 telas mobile · 390×844 · paleta Terracota</div>
    </header>
    <main id="root"></main>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="source/screens.jsx"></script>
    <script type="text/babel" src="source/screens-extra.jsx"></script>
    <script type="text/babel" src="source/screens-dashboard.jsx"></script>

    <script type="text/babel">
      const t = window.PALETTES.terracotta;
      const SCREENS = [
        { id: "01-dashboard", title: "01 · Dashboard", el: <ScreenDashboard t={t} /> },
        { id: "02-viagens", title: "02 · Viagens", el: <ScreenViagens t={t} /> },
        { id: "03-empresa", title: "03 · Empresa", el: <ScreenEmpresa t={t} /> },
        { id: "04-perfil", title: "04 · Perfil", el: <ScreenPerfil t={t} /> },
        { id: "05-trip-detail", title: "05 · Detalhe da viagem", el: <ScreenTripDetail t={t} /> },
        { id: "06-modal-new-trip", title: "06 · Nova viagem (modal)", el: <ModalNewTrip t={t} /> },
        {
          id: "07-modal-new-template",
          title: "07 · Novo template (modal)",
          el: <ModalNewTemplate t={t} />,
        },
        {
          id: "08-report-finance",
          title: "08 · Relatório · Financeiro",
          el: <ScreenDashboardReport t={t} />,
        },
        {
          id: "09-report-ops",
          title: "09 · Relatório · Operação",
          el: <ScreenDashboardReportOps t={t} />,
        },
      ];

      function App() {
        return SCREENS.map((s) => (
          <div key={s.id} className="cell">
            <div className="label">{s.title}</div>
            <div className="frame">{s.el}</div>
          </div>
        ));
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
