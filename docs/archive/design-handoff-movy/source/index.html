<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JRegu's — Redesign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f0eee9;
        font-family:
          "Manrope",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
      }
      #root {
        height: 100%;
      }
    </style>
  </head>

    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>

      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="tweaks-panel.jsx"></script>

    <!-- Shared primitives — tokens, icons, Phone, TopBar, BottomNav, Card, Bar -->
    <script type="text/babel" src="shared.jsx"></script>

    <script type="text/babel" src="dashboard.jsx"></script>
    <script type="text/babel" src="viagens.jsx"></script>
    <script type="text/babel" src="templates.jsx"></script>
    <script type="text/babel" src="empresa.jsx"></script>
    <script type="text/babel" src="perfil.jsx"></script>

    <script type="text/babel" src="login.jsx"></script>
    <script type="text/babel" src="cadastro.jsx"></script>
